<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计算器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" aria-label="标准计算器">
    <section class="calculator" aria-label="计算器">
      <header class="calculator-header">
        <div>
          <p class="eyebrow">Standard</p>
          <h1>计算器</h1>
        </div>
        <span class="mode-pill">键盘可用</span>
      </header>

      <section class="display" aria-live="polite">
        <div class="display-expression" data-display-expression>准备就绪</div>
        <div class="display-value" data-display-value>0</div>
        <div class="display-status" data-status>准备就绪</div>
      </section>

      <section class="keypad" aria-label="计算器按键">
        <button class="key danger" type="button" data-action="clear-all">AC</button>
        <button class="key utility" type="button" data-action="clear-entry">CE</button>
        <button class="key utility" type="button" data-action="backspace" aria-label="退格">⌫</button>
        <button class="key operator" type="button" data-action="operator" data-value="/">÷</button>

        <button class="key utility" type="button" data-action="token" data-value="(">(</button>
        <button class="key utility" type="button" data-action="token" data-value=")">)</button>
        <button class="key utility" type="button" data-action="percent">%</button>
        <button class="key operator" type="button" data-action="operator" data-value="*">×</button>

        <button class="key utility" type="button" data-action="sqrt">√x</button>
        <button class="key utility" type="button" data-action="square">x²</button>
        <button class="key utility" type="button" data-action="reciprocal">1/x</button>
        <button class="key operator" type="button" data-action="operator" data-value="-">−</button>

        <button class="key number" type="button" data-action="number" data-value="7">7</button>
        <button class="key number" type="button" data-action="number" data-value="8">8</button>
        <button class="key number" type="button" data-action="number" data-value="9">9</button>
        <button class="key operator" type="button" data-action="operator" data-value="+">+</button>

        <button class="key number" type="button" data-action="number" data-value="4">4</button>
        <button class="key number" type="button" data-action="number" data-value="5">5</button>
        <button class="key number" type="button" data-action="number" data-value="6">6</button>
        <button class="key equal" type="button" data-action="equals">=</button>

        <button class="key number" type="button" data-action="number" data-value="1">1</button>
        <button class="key number" type="button" data-action="number" data-value="2">2</button>
        <button class="key number" type="button" data-action="number" data-value="3">3</button>

        <button class="key utility" type="button" data-action="sign">±</button>
        <button class="key number zero" type="button" data-action="number" data-value="0">0</button>
        <button class="key number" type="button" data-action="number" data-value=".">.</button>
      </section>
    </section>

    <aside class="history-panel" aria-label="历史记录">
      <div class="history-header">
        <p class="eyebrow">History</p>
        <h2>最近计算</h2>
      </div>
      <ul class="history-list" data-history></ul>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
